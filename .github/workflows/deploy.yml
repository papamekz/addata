name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          cp -R web/. _site/
          cp -R data schema _site/
          cp -R .well-known _site/
          cp llms.txt llms-full.txt agent-manifest.json AGENT_CLAIM_WORKFLOW.md croissant.json ro-crate-metadata.json datapackage.json _site/
          cp robots.txt sitemap.xml addata-indexnow-20260504.txt _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
